name: Deploy

on:
  push:
    branches: [master]

jobs:
  test-and-deploy:
    name: Test & Deploy to Render
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore
        run: dotnet restore src/Zorvian.Web/Zorvian.Web.csproj

      - name: Build
        run: dotnet build src/Zorvian.Web/Zorvian.Web.csproj --no-restore -c Release

      - name: Test
        run: dotnet test tests/Zorvian.Tests/Zorvian.Tests.csproj --no-build -c Release --verbosity normal

      - name: Trigger Render Deploy
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
