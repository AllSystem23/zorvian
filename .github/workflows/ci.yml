name: CI

on:
  push:
    branches: [master, dev]
  pull_request:
    branches: [master]

jobs:
  backend:
    name: Backend Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore dependencies
        run: dotnet restore src/Zorvian.Web/Zorvian.Web.csproj

      - name: Build
        run: dotnet build src/Zorvian.Web/Zorvian.Web.csproj --no-restore -c Release

      - name: Test
        run: dotnet test tests/Zorvian.Tests/Zorvian.Tests.csproj --no-build -c Release --verbosity normal

  frontend:
    name: Frontend Analyze
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        working-directory: frontend
        run: flutter pub get

      - name: Analyze
        working-directory: frontend
        run: flutter analyze
